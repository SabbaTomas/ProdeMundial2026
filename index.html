<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mundial 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0B1622;--bg2:#0F1D2E;--card:#142238;--card2:#182E4A;
  --border:#1E3A5F;--accent:#00E5FF;--gold:#FFD700;
  --green:#4CAF50;--green2:#1B5E20;--amber:#FFC107;--red:#F44336;
  --text:#E8EAF0;--text2:#8899AA;--text3:#556677;
}
html{font-size:14px}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
.header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#0B1622 0%,#142238 100%);border-bottom:1px solid var(--border);padding:0.5rem 0.75rem}
.header-top{display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:1.15rem;font-weight:700;background:linear-gradient(90deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.5px;line-height:1.2}
.header h1 span{font-size:0.65rem;display:block;font-weight:400;-webkit-text-fill-color:var(--text2);background:none;margin-top:1px}
.header-actions{display:flex;align-items:center;gap:0.5rem}
.btn-icon{width:2rem;height:2rem;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:0.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.btn-icon:hover{background:var(--card2);color:var(--text)}
.btn-icon.danger{border-color:rgba(244,67,54,0.4);color:var(--red)}
.btn-icon.danger:hover{background:var(--red);color:white}
.tabs{display:flex;gap:0.2rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-top:0.4rem;padding-bottom:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:0.35rem 0.65rem;border-radius:0.4rem;border:1px solid transparent;background:transparent;color:var(--text3);font-size:0.75rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.2s;letter-spacing:0.3px}
.tab:hover{background:var(--card);color:var(--text2)}
.tab.active{background:var(--card2);color:var(--accent);border-color:rgba(0,229,255,0.3)}
.tab.gold.active{color:var(--gold);border-color:rgba(255,215,0,0.3)}

.content{display:none;padding:0.5rem 0.5rem 2rem;max-width:1400px;margin:0 auto}
.content.active{display:block}

.group-filter{display:flex;gap:0.2rem;overflow-x:auto;padding:0.4rem 0;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:0.4rem}
.group-filter::-webkit-scrollbar{display:none}
.filter-btn{padding:0.3rem 0.55rem;border-radius:0.35rem;border:1px solid var(--border);background:var(--bg2);color:var(--text3);font-size:0.7rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.15s;letter-spacing:0.5px}
.filter-btn:hover{background:var(--card);color:var(--text2)}
.filter-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}

.progress-bar{height:3px;background:var(--card);border-radius:2px;margin:0.4rem 0 0.3rem;overflow:hidden}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:2px;transition:width 0.3s}
.progress-text{font-size:0.65rem;color:var(--text3)}

.matchday-label{font-size:0.7rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;padding:0.65rem 0 0.2rem;border-bottom:1px solid var(--border);margin-bottom:0.4rem;display:flex;justify-content:space-between;align-items:center}
.matchday-date{color:var(--text3);font-weight:400;font-size:0.65rem;letter-spacing:0}

.match-card{background:var(--card);border-radius:0.6rem;border:1px solid var(--border);margin-bottom:0.4rem;overflow:hidden;transition:border-color 0.2s,background 0.2s}
.match-card:hover{border-color:rgba(0,229,255,0.3)}
.match-card.played{border-left:3px solid var(--green)}
.match-meta{display:flex;justify-content:space-between;padding:0.25rem 0.65rem;font-size:0.6rem;color:var(--text3);border-bottom:1px solid rgba(30,58,95,0.4)}
.match-meta .group-label{font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;font-size:0.6rem}
.match-body{display:flex;align-items:center;padding:0.45rem 0.6rem;gap:0.25rem}
.team{flex:1;display:flex;align-items:center;gap:0.3rem;min-width:0}
.team.away{flex-direction:row-reverse;text-align:right}
.team-name{font-size:0.82rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2}
.team-name.long{font-size:0.72rem}
.result-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin:0 2px}
.result-dot.w{background:var(--green)}
.result-dot.d{background:var(--amber)}
.result-dot.l{background:var(--red)}

.score-box{display:flex;align-items:center;gap:0.1rem;flex-shrink:0}
.score-box .dash{color:var(--text3);font-weight:300;font-size:0.85rem;margin:0 1px}
.score-input{width:2.1rem;height:2.1rem;text-align:center;border-radius:0.35rem;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:0.95rem;font-weight:700;font-family:inherit;outline:none;-moz-appearance:textfield;transition:border-color 0.2s,box-shadow 0.2s}
.score-input::-webkit-outer-spin-button,.score-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.score-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,229,255,0.25)}
.score-input.has-value{border-color:rgba(76,175,80,0.5);background:rgba(76,175,80,0.08)}

.ko-match-card{background:var(--card);border-radius:0.6rem;border:1px solid var(--border);margin-bottom:0.4rem;overflow:hidden;transition:border-color 0.2s}
.ko-match-card.played{border-left:3px solid var(--green)}
.ko-match-meta{padding:0.25rem 0.65rem;font-size:0.6rem;color:var(--text3);border-bottom:1px solid rgba(30,58,95,0.4);display:flex;justify-content:space-between}
.ko-match-body{display:flex;align-items:center;padding:0.45rem 0.6rem}
.ko-team{flex:1;display:flex;align-items:center;gap:0.3rem;min-width:0;overflow:hidden}
.ko-team.away{flex-direction:row-reverse;text-align:right}
.ko-team .name{font-size:0.78rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ko-team .placeholder{font-size:0.65rem;color:var(--gold);font-weight:500;font-style:italic}
.ko-score{display:flex;align-items:center;gap:0.1rem;flex-shrink:0}
.ko-score .dash{color:var(--text3);font-size:0.85rem;margin:0 1px}
.ko-score input{width:2.1rem;height:2.1rem;text-align:center;border-radius:0.35rem;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:0.95rem;font-weight:700;font-family:inherit;outline:none;-moz-appearance:textfield;transition:border-color 0.2s,box-shadow 0.2s}
.ko-score input::-webkit-outer-spin-button,.ko-score input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.ko-score input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,229,255,0.25)}
.ko-score input.has-value{border-color:rgba(76,175,80,0.5);background:rgba(76,175,80,0.08)}

.round-label{font-size:0.8rem;font-weight:700;color:var(--gold);padding:0.6rem 0 0.2rem;border-bottom:1px solid var(--border);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:1px}

.group-section{margin-bottom:0.6rem}
.group-title{font-size:0.8rem;font-weight:700;color:var(--accent);padding:0.4rem 0 0.15rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.group-title .chevron{transition:transform 0.2s;font-size:0.65rem;color:var(--text3)}
.group-title.collapsed .chevron{transform:rotate(-90deg)}
.group-table-wrap{overflow-x:auto;margin-bottom:0.5rem;-webkit-overflow-scrolling:touch}
.group-table{width:100%;border-collapse:collapse;font-size:0.72rem}
.group-table th{background:var(--card2);padding:0.35rem 0.25rem;text-align:center;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border);font-size:0.6rem;white-space:nowrap;text-transform:uppercase;letter-spacing:0.5px}
.group-table th.team-col{text-align:left;padding-left:0.4rem;min-width:90px}
.group-table td{padding:0.35rem 0.25rem;text-align:center;border-bottom:1px solid rgba(30,58,95,0.25);white-space:nowrap}
.group-table td.team-col{text-align:left;padding-left:0.4rem;font-weight:500}
.group-table td.pos{font-weight:700;width:1.3rem;color:var(--text3);font-size:0.65rem}
.group-table td.pts{font-weight:800;color:var(--accent);font-size:0.75rem}
.group-table tr.qualify td.pos{color:var(--green)}
.group-table td.gf, .group-table td.gc, .group-table td.dg{color:var(--text2)}
.group-table td.dg.pos-dg{font-weight:600}

.team-cell{display:flex;align-items:center;gap:0.25rem;min-width:0}
.team-cell .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.72rem;line-height:1.2}
.team-cell .code{color:var(--text3);font-size:0.55rem;font-weight:500;margin-left:auto;flex-shrink:0}

.prob-bar{height:4px;background:var(--bg);border-radius:2px;margin-top:2px;display:flex;overflow:hidden;gap:1px}
.prob-bar .seg{height:100%;transition:width 0.3s}
.prob-bar .p1{background:var(--green)}
.prob-bar .p2{background:var(--accent)}
.prob-bar .p3{background:var(--amber)}
.prob-bar .p4{background:var(--red)}
.prob-cell{width:50px}
.prob-text{font-size:0.6rem;color:var(--text3);margin-top:1px;text-align:center}
.prob-text .top2{color:var(--accent);font-weight:600}
.prob-toggle{display:flex;gap:0.25rem;margin-bottom:0.5rem}
.prob-toggle-btn{padding:0.35rem 0.75rem;border-radius:0.4rem;border:1px solid var(--border);background:var(--bg2);color:var(--text3);font-size:0.72rem;font-weight:600;cursor:pointer;transition:all 0.15s}
.prob-toggle-btn:hover{background:var(--card);color:var(--text2)}
.prob-toggle-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.prob-table{width:100%;border-collapse:collapse;font-size:0.72rem;margin-bottom:0.75rem}
.prob-table th{background:var(--card2);padding:0.3rem 0.2rem;text-align:center;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border);font-size:0.6rem;white-space:nowrap;text-transform:uppercase;letter-spacing:0.5px}
.prob-table th.pos-col{width:1.3rem}
.prob-table th.team-col{text-align:left;padding-left:0.4rem;min-width:90px}
.prob-table th.prob-col{width:3.5rem}
.prob-table td{padding:0.3rem 0.2rem;text-align:center;border-bottom:1px solid rgba(30,58,95,0.25);white-space:nowrap}
.prob-table td.team-col{text-align:left;padding-left:0.4rem;font-weight:500}
.prob-table td.prob-col{font-size:0.7rem;font-weight:600}
.prob-bar-h{height:3px;background:var(--bg);border-radius:2px;margin-top:2px;display:flex;overflow:hidden;gap:1px}
.prob-bar-h .seg{height:100%}
.prob-bar-h .p1{background:var(--green)}
.prob-bar-h .p2{background:var(--accent)}
.prob-bar-h .p3{background:var(--amber)}
.prob-bar-h .p4{background:var(--red)}
.prob-name{font-size:0.72rem;line-height:1.2}
.prob-code{font-size:0.55rem;color:var(--text3);display:block}

.desktop-layout{display:none}
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;justify-content:center;align-items:center}
.confirm-overlay.show{display:flex}
.confirm-box{background:var(--card2);border-radius:1rem;padding:1.75rem;text-align:center;max-width:300px;border:1px solid var(--border);margin:1rem}
.confirm-box h3{margin-bottom:0.75rem;font-size:0.95rem}
.confirm-box p{font-size:0.8rem;color:var(--text2);margin-bottom:1.5rem}
.confirm-box .btns{display:flex;gap:0.5rem;justify-content:center}
.btn{padding:0.45rem 1rem;border-radius:0.5rem;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:0.8rem;cursor:pointer;transition:all 0.2s;font-weight:500}
.btn:hover{background:var(--card2);color:var(--text)}
.btn.danger{border-color:rgba(244,67,54,0.5);color:var(--red)}
.btn.danger:hover{background:var(--red);color:white}
.btn.share{border-color:rgba(0,229,255,0.4);color:var(--accent)}
.btn.share:hover{background:var(--accent);color:var(--bg)}
.share-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;justify-content:center;align-items:center}
.share-overlay.show{display:flex}
.share-box{background:var(--card2);border-radius:1rem;padding:1.5rem;max-width:380px;width:calc(100% - 2rem);border:1px solid var(--border);margin:1rem}
.share-box h3{margin-bottom:0.75rem;font-size:0.95rem}
.share-box p{font-size:0.75rem;color:var(--text2);margin-bottom:0.75rem;line-height:1.4}
.share-link-box{background:var(--bg);border:1px solid var(--border);border-radius:0.5rem;padding:0.5rem;font-size:0.7rem;color:var(--accent);word-break:break-all;max-height:80px;overflow-y:auto;margin-bottom:0.75rem;font-family:monospace;line-height:1.4}
.share-btns{display:flex;gap:0.5rem;flex-wrap:wrap}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--accent);color:var(--accent);padding:0.5rem 1rem;border-radius:0.5rem;font-size:0.8rem;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}

@media(min-width:768px){
  html{font-size:15px}
  .mobile-only{display:none}
  .desktop-layout{display:grid;grid-template-columns:3fr 2fr;gap:1rem;padding:0.75rem}
  .desktop-matches{grid-column:1}
  .desktop-groups{grid-column:2;position:sticky;top:4.5rem;max-height:calc(100vh - 5.5rem);overflow-y:auto;padding-right:0.25rem}
  .desktop-groups::-webkit-scrollbar{width:4px}
  .desktop-groups::-webkit-scrollbar-track{background:var(--bg)}
  .desktop-groups::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .content.mobile-content{display:none!important}
  .content.mobile-content.active{display:none!important}
  .header{padding:0.5rem 1.5rem}
  .match-card{margin-bottom:0.5rem}
  .group-section{margin-bottom:0.75rem}
  .group-table{min-width:460px}
}
@media(min-width:1200px){
  .desktop-layout{grid-template-columns:3fr 2fr}
  .group-table{min-width:500px}
}
</style>
</head>

const teamMap = {};
TEAMS.forEach(t => teamMap[t.name] = t);

const GROUP_LETTERS = 'ABCDEFGHIJKL'.split('');
const GROUP_NAMES = GROUP_LETTERS.map(l => 'Group ' + l);

let results = {};
let currentTab = 'matches';
let currentFilter = 'all';

function loadResults() {
  try {
    const saved = localStorage.getItem('wc2026_results');
    if (saved) results = JSON.parse(saved);
  } catch(e) { results = {}; }
}

function saveResults() {
  localStorage.setItem('wc2026_results', JSON.stringify(results));
}

function matchKey(m) {
  if (m.num) return 'ko_' + m.num;
  return m.team1 + '_vs_' + m.team2 + '_' + m.date;
}

function formatDate(dateStr) {
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const days = ['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
  const d = new Date(dateStr + 'T12:00:00');
  return days[d.getDay()] + ' ' + d.getDate() + ' ' + months[d.getMonth()];
}

function formatRound(round) {
  const map = {
    'Matchday 1':'Jornada 1','Matchday 2':'Jornada 2','Matchday 3':'Jornada 3',
    'Matchday 4':'Jornada 4','Matchday 5':'Jornada 5','Matchday 6':'Jornada 6',
    'Matchday 7':'Jornada 7','Matchday 8':'Jornada 8','Matchday 9':'Jornada 9',
    'Matchday 10':'Jornada 10','Matchday 11':'Jornada 11','Matchday 12':'Jornada 12',
    'Matchday 13':'Jornada 13','Matchday 14':'Jornada 14','Matchday 15':'Jornada 15',
    'Matchday 16':'Jornada 16','Matchday 17':'Jornada 17',
    'Round of 32':'Octavos de Final','Round of 16':'Dieciseisavos de Final',
    'Quarter-final':'Cuartos de Final','Semi-final':'Semifinal',
    'Match for third place':'Tercer Puesto','Final':'Final'
  };
  return map[round] || round;
}

function isGroupMatch(m) {
  return m.group && m.group.startsWith('Group');
}

function getGroupMatches(groupName) {
  return MATCHES.filter(m => m.group === groupName);
}

function getGroupLetter(groupName) {
  return groupName.replace('Group ', '');
}

function getCode(teamName) {
  const t = teamMap[teamName];
  return t ? t.fifa_code : '';
}

function resolveTeamRef(ref) {
  if (!ref) return { name: '', placeholder: true };
  const match = ref.match(/^([123])([A-L])$/);
  if (match) {
    const pos = parseInt(match[1]);
    const groupLetter = match[2];
    const groupName = 'Group ' + groupLetter;
    const standings = calculateStandings(groupName);
    if (standings.length >= pos) {
      return { name: standings[pos - 1].name, code: getCode(standings[pos - 1].name), placeholder: false };
    }
    return { name: pos + '\u00B0 ' + groupName, code: '', placeholder: true };
  }
  if (ref.match(/^[123].*\//)) {
    return { name: ref, code: '', placeholder: true };
  }
  if (ref.startsWith('W') || ref.startsWith('L')) {
    const num = parseInt(ref.substring(1));
    const koResult = results['ko_' + num];
    if (koResult && koResult[0] !== null && koResult[1] !== null) {
      const parentMatch = MATCHES.find(m => m.num === num);
      if (parentMatch) {
        const isWinner = ref.startsWith('W');
        let teamRef;
        if (koResult[0] > koResult[1]) {
          teamRef = isWinner ? parentMatch.team1 : parentMatch.team2;
        } else if (koResult[0] < koResult[1]) {
          teamRef = isWinner ? parentMatch.team2 : parentMatch.team1;
        } else {
          teamRef = isWinner ? parentMatch.team1 : parentMatch.team2;
        }
        const resolved = resolveTeamRef(teamRef);
        if (!resolved.placeholder) return resolved;
        return { name: teamRef, code: '', placeholder: true };
      }
    }
    const prefix = ref.startsWith('W') ? 'Ganador ' : 'Perdedor ';
    return { name: prefix + '#' + num, code: '', placeholder: true };
  }
  const t = teamMap[ref];
  if (t) return { name: ref, code: t.fifa_code, placeholder: false };
  return { name: ref, code: '', placeholder: false };
}

function calculateStandings(groupName) {
  const group = GROUPS.find(g => g.name === groupName);
  if (!group) return [];
  const standings = {};
  group.teams.forEach(name => {
    standings[name] = { pj:0, pg:0, pe:0, pp:0, gf:0, gc:0, pts:0 };
  });
  const matches = getGroupMatches(groupName);
  matches.forEach(m => {
    const key = matchKey(m);
    const result = results[key];
    if (!result || result[0] === null || result[1] === null) return;
    const [g1, g2] = result;
    const t1 = m.team1, t2 = m.team2;
    if (!standings[t1] || !standings[t2]) return;
    standings[t1].pj++; standings[t2].pj++;
    standings[t1].gf += g1; standings[t1].gc += g2;
    standings[t2].gf += g2; standings[t2].gc += g1;
    if (g1 > g2) {
      standings[t1].pg++; standings[t2].pp++; standings[t1].pts += 3;
    } else if (g1 < g2) {
      standings[t2].pg++; standings[t1].pp++; standings[t2].pts += 3;
    } else {
      standings[t1].pe++; standings[t2].pe++; standings[t1].pts++; standings[t2].pts++;
    }
  });

  const teamNames = group.teams.map(name => ({
    name, code: getCode(name),
    ...standings[name],
    dg: standings[name].gf - standings[name].gc
  }));

  teamNames.sort((a, b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    if (b.dg !== a.dg) return b.dg - a.dg;
    if (b.gf !== a.gf) return b.gf - a.gf;
    const h2hMatches = matches.filter(m =>
      (m.team1 === a.name && m.team2 === b.name) || (m.team1 === b.name && m.team2 === a.name)
    );
    let aH2H = 0, bH2H = 0;
    h2hMatches.forEach(m => {
      const key = matchKey(m);
      const result = results[key];
      if (!result || result[0] === null || result[1] === null) return;
      if (m.team1 === a.name) {
        if (result[0] > result[1]) aH2H += 3;
        else if (result[0] < result[1]) bH2H += 3;
        else { aH2H++; bH2H++; }
      } else {
        if (result[1] > result[0]) aH2H += 3;
        else if (result[1] < result[0]) bH2H += 3;
        else { aH2H++; bH2H++; }
      }
    });
    if (aH2H !== bH2H) return bH2H - aH2H;
    return a.name.localeCompare(b.name);
  });

  return teamNames;
}

function getGroupMatchesByDate() {
  const groupMatches = MATCHES.filter(m => isGroupMatch(m));
  const byDate = {};
  groupMatches.forEach(m => {
    if (!byDate[m.date]) byDate[m.date] = [];
    byDate[m.date].push(m);
  });
  return Object.keys(byDate).sort().map(date => ({
    date,
    matches: byDate[date].sort((a, b) => {
      if (a.time < b.time) return -1;
      if (a.time > b.time) return 1;
      return a.group.localeCompare(b.group);
    })
  }));
}

function getKOMatches() {
  return MATCHES.filter(m => !isGroupMatch(m)).sort((a, b) => {
    if (a.num && b.num) return a.num - b.num;
    return a.date.localeCompare(b.date);
  });
}

function countPlayed() {
  const groupMatches = MATCHES.filter(m => isGroupMatch(m));
  let played = 0;
  groupMatches.forEach(m => {
    const key = matchKey(m);
    if (results[key] && results[key][0] !== null && results[key][1] !== null) played++;
  });
  return { played, total: groupMatches.length };
}

function getResultIndicator(teamIdx, s1, s2) {
  if (s1 === null || s2 === null) return '';
  const win = teamIdx === 0 ? s1 > s2 : s2 > s1;
  const draw = s1 === s2;
  if (win) return 'w';
  if (draw) return 'd';
  return 'l';
}

function renderMatchCard(m, isKO) {
  const key = matchKey(m);
  const result = results[key];
  const hasResult = result && result[0] !== null && result[1] !== null;
  const playedClass = hasResult ? ' played' : '';

  if (isKO) {
    const t1 = resolveTeamRef(m.team1);
    const t2 = resolveTeamRef(m.team2);
    const t1Name = t1.placeholder ? `<span class="placeholder">${t1.name}</span>` : t1.name;
    const t2Name = t2.placeholder ? `<span class="placeholder">${t2.name}</span>` : t2.name;
    const t1Class = hasResult ? (result[0] > result[1] ? 'winner' : (result[0] < result[1] ? 'loser' : 'draw')) : '';
    const t2Class = hasResult ? (result[1] > result[0] ? 'winner' : (result[1] < result[0] ? 'loser' : 'draw')) : '';

    let roundLabel = formatRound(m.round);

    const v1 = result && result[0] !== null ? result[0] : '';
    const v2 = result && result[1] !== null ? result[1] : '';
    const has1 = result && result[0] !== null ? ' has-value' : '';
    const has2 = result && result[1] !== null ? ' has-value' : '';

    return `
      <div class="ko-match-card${playedClass}" data-key="${key}">
        <div class="ko-match-meta">
          <span>${roundLabel}</span>
          <span>${formatDate(m.date)}</span>
        </div>
        <div class="ko-match-body">
          <div class="ko-team home ${t1Class}">
            <span class="name">${t1Name}</span>
          </div>
          <div class="ko-score">
            <input type="number" min="0" max="99" value="${v1}" data-key="${key}" data-team="0" class="score-input${has1}"  oninput="onScoreInput(this)" onblur="onScoreChange(this)">
            <span class="dash">-</span>
            <input type="number" min="0" max="99" value="${v2}" data-key="${key}" data-team="1" class="score-input${has2}"  oninput="onScoreInput(this)" onblur="onScoreChange(this)">
          </div>
          <div class="ko-team away ${t2Class}">
            <span class="name">${t2Name}</span>
          </div>
        </div>
      </div>`;
  }

  const v1 = result && result[0] !== null ? result[0] : '';
  const v2 = result && result[1] !== null ? result[1] : '';
  const has1 = result && result[0] !== null ? ' has-value' : '';
  const has2 = result && result[1] !== null ? ' has-value' : '';
  const r1 = hasResult ? getResultIndicator(0, result[0], result[1]) : '';
  const r2 = hasResult ? getResultIndicator(1, result[0], result[1]) : '';

  return `
    <div class="match-card${playedClass}" data-key="${key}">
      <div class="match-meta">
        <span class="group-label">Grupo ${getGroupLetter(m.group)}</span>
        <span>${formatDate(m.date)}</span>
      </div>
      <div class="match-body">
        <div class="team home">
          <span class="team-name">${m.team1}</span>
          ${r1 ? `<span class="result-dot ${r1}"></span>` : ''}
        </div>
        <div class="score-box">
          <input type="number" min="0" max="99" value="${v1}" data-key="${key}" data-team="0" class="score-input${has1}"  oninput="onScoreInput(this)" onblur="onScoreChange(this)">
          <span class="dash">&ndash;</span>
          <input type="number" min="0" max="99" value="${v2}" data-key="${key}" data-team="1" class="score-input${has2}"  oninput="onScoreInput(this)" onblur="onScoreChange(this)">
        </div>
        <div class="team away">
          <span class="team-name">${m.team2}</span>
          ${r2 ? `<span class="result-dot ${r2}"></span>` : ''}
        </div>
      </div>
    </div>`;
}

function getTeamResult(teamName, g1, g2) {
  if (g1 === null || g2 === null) return null;
  if (g1 > g2) return teamName === 'home' ? 'W' : 'L';
  if (g1 < g2) return teamName === 'home' ? 'L' : 'W';
  return 'D';
}

function simulateGroupPositions(groupName) {
  const group = GROUPS.find(g => g.name === groupName);
  if (!group) return {};
  const groupMatches = getGroupMatches(groupName);
  const teams = group.teams;

  const remaining = groupMatches.filter(m => {
    const k = matchKey(m);
    return !results[k] || results[k][0] === null || results[k][1] === null;
  });

  if (remaining.length === groupMatches.length) {
    const eq = {};
    teams.forEach(t => { eq[t] = [25, 25, 25, 25]; });
    return eq;
  }

  const outcomes = [];
  function gen(i, cur) {
    if (i === remaining.length) { outcomes.push([...cur]); return; }
    for (const o of ['W','D','L']) { cur.push(o); gen(i+1, cur); cur.pop(); }
  }
  gen(0, []);

  const sW = [2,1], sD = [1,1], sL = [1,2];

  const pos = {};
  teams.forEach(t => { pos[t] = [0,0,0,0]; });

  outcomes.forEach(outcomes2 => {
    const sr = {};
    groupMatches.forEach(m => {
      const k = matchKey(m);
      if (results[k] && results[k][0] !== null && results[k][1] !== null) {
        sr[k] = [results[k][0], results[k][1]];
      }
    });
    remaining.forEach((m, i) => {
      const o = outcomes2[i];
      sr[matchKey(m)] = o === 'W' ? sW : o === 'D' ? sD : sL;
    });

    const ss = {};
    teams.forEach(n => { ss[n] = {pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,pts:0}; });

    groupMatches.forEach(m => {
      const [g1,g2] = sr[matchKey(m)];
      const t1=m.team1, t2=m.team2;
      ss[t1].pj++; ss[t2].pj++;
      ss[t1].gf+=g1; ss[t1].gc+=g2; ss[t2].gf+=g2; ss[t2].gc+=g1;
      if (g1>g2) { ss[t1].pg++; ss[t2].pp++; ss[t1].pts+=3; }
      else if (g1<g2) { ss[t2].pg++; ss[t1].pp++; ss[t2].pts+=3; }
      else { ss[t1].pe++; ss[t2].pe++; ss[t1].pts++; ss[t2].pts++; }
    });

    const sorted = teams.map(n => ({name:n,...ss[n],dg:ss[n].gf-ss[n].gc}));
    sorted.sort((a,b) => {
      if (b.pts!==a.pts) return b.pts-a.pts;
      if (b.dg!==a.dg) return b.dg-a.dg;
      if (b.gf!==a.gf) return b.gf-a.gf;
      return a.name.localeCompare(b.name);
    });

    sorted.forEach((t,i) => { pos[t.name][i]++; });
  });

  const total = outcomes.length || 1;
  const probs = {};
  teams.forEach(t => {
    probs[t] = pos[t].map(c => Math.round((c/total)*100));
  });
  return probs;
}

function renderGroupTable(groupName) {
  const standings = calculateStandings(groupName);
  const letter = getGroupLetter(groupName);
  const groupMatches = getGroupMatches(groupName);
  const played = groupMatches.filter(m => {
    const key = matchKey(m);
    return results[key] && results[key][0] !== null && results[key][1] !== null;
  }).length;

  const probs = simulateGroupPositions(groupName);

  const rows = standings.map((t, i) => {
    const posClass = i < 2 ? 'qualify' : '';
    const dgVal = t.dg > 0 ? '+' + t.dg : String(t.dg);
    const dgClass = t.dg > 0 ? 'dg pos-dg' : (t.dg < 0 ? 'dg neg' : 'dg');
    const p = probs[t.name] || [0, 0, 0, 0];
    const top2 = p[0] + p[1];
    const barHtml = `<div class="prob-bar">
      <div class="seg p1" style="width:${p[0]}%"></div>
      <div class="seg p2" style="width:${p[1]}%"></div>
      <div class="seg p3" style="width:${p[2]}%"></div>
      <div class="seg p4" style="width:${p[3]}%"></div>
    </div>`;
    return `<tr class="${posClass}">
      <td class="pos">${i + 1}</td>
      <td class="team-col"><div class="team-cell"><span class="name">${t.name}</span><span class="code">${t.code}</span></div>${played < 3 ? barHtml : ''}</td>
      <td class="pts">${t.pts}</td><td>${t.pj}</td><td>${t.pg}</td><td>${t.pe}</td><td>${t.pp}</td>
      <td>${t.gf}</td><td>${t.gc}</td><td class="${dgClass}">${dgVal}</td>
    </tr>`;
  }).join('');

  return `
    <div class="group-section" data-group="${groupName}">
      <div class="group-title" onclick="toggleGroup(this)">
        <span>Grupo ${letter} <small style="color:var(--text3);font-weight:400">${played}/3</small></span>
        <span class="chevron">&#9662;</span>
      </div>
      <div class="group-table-wrap">
        <table class="group-table">
          <thead>
            <tr>
              <th class="pos-col">#</th>
              <th class="team-col">Equipo</th>
              <th class="pts">Pts</th><th>PJ</th><th>PG</th><th>PE</th><th>PP</th>
              <th>GF</th><th>GC</th><th>DG</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function toggleGroup(el) {
  el.classList.toggle('collapsed');
  const wrap = el.parentElement.querySelector('.group-table-wrap');
  wrap.style.display = wrap.style.display === 'none' ? '' : 'none';
}

function onScoreChange(input) {
  const key = input.dataset.key;
  const teamIdx = parseInt(input.dataset.team);
  const val = input.value.trim();

  if (!results[key]) results[key] = [null, null];

  if (val === '') {
    results[key][teamIdx] = null;
    if (results[key][0] === null && results[key][1] === null) {
      delete results[key];
    }
  } else {
    results[key][teamIdx] = parseInt(val);
    if (isNaN(results[key][teamIdx])) {
      results[key][teamIdx] = null;
      if (results[key][0] === null && results[key][1] === null) delete results[key];
    }
  }

  saveResults();

  if (input.value.trim() !== '') {
    input.classList.add('has-value');
  } else {
    input.classList.remove('has-value');
  }
}

function onScoreInput(input) {
  if (input.value.trim() !== '') {
    input.classList.add('has-value');
  } else {
    input.classList.remove('has-value');
  }
}

function renderMatchesView(container, filter) {
  const byDate = getGroupMatchesByDate();
  let html = '';

  const count = countPlayed();
  const pct = count.total > 0 ? Math.round((count.played / count.total) * 100) : 0;
  html += `<div class="progress-text">${count.played}/${count.total} jugados (${pct}%)</div>`;
  html += `<div class="progress-bar"><div class="fill" style="width:${pct}%"></div></div>`;

  html += '<div class="group-filter" id="groupFilter">';
  html += '<button class="filter-btn active" data-filter="all" onclick="setFilter(\'all\',this)">Todos</button>';
  GROUP_LETTERS.forEach(l => {
    const active = filter === l ? ' active' : '';
    html += `<button class="filter-btn${active}" data-filter="${l}" onclick="setFilter('${l}',this)">${l}</button>`;
  });
  html += '</div>';

  byDate.forEach(({ date, matches }) => {
    let filtered = matches;
    if (filter !== 'all') {
      const groupName = 'Group ' + filter;
      filtered = matches.filter(m => m.group === groupName);
    }
    if (filtered.length === 0) return;

    const matchday = filtered[0].round;
    html += `<div class="matchday-label">${formatRound(matchday)}<span class="matchday-date">${formatDate(date)}</span></div>`;
    filtered.forEach(m => {
      html += renderMatchCard(m, false);
    });
  });

  container.innerHTML = html;
}

function renderGroupsView(container, showReset) {
  let html = '';

  if (showReset !== false) {
    const count = countPlayed();
    const pct = count.total > 0 ? Math.round((count.played / count.total) * 100) : 0;
    html += `<div class="progress-text">${count.played}/${count.total} jugados (${pct}%)</div>`;
    html += `<div class="progress-bar"><div class="fill" style="width:${pct}%"></div></div>`;
    html += '<div style="display:flex;gap:0.5rem;margin-bottom:0.5rem">';
    html += '<button class="btn share" onclick="openShare()">Compartir</button>';
    html += '<button class="btn danger" onclick="confirmReset()">Limpiar</button>';
    html += '</div>';
    html += '<div class="prob-toggle">';
    html += `<button class="prob-toggle-btn${!showProbs ? ' active' : ''}" onclick="toggleProbs(false)">Tabla</button>`;
    html += `<button class="prob-toggle-btn${showProbs ? ' active' : ''}" onclick="toggleProbs(true)">Probabilidades</button>`;
    html += '</div>';
  }

  GROUP_NAMES.forEach(gn => {
    html += showProbs ? renderGroupProbTable(gn) : renderGroupTable(gn);
  });

  container.innerHTML = html;
}

function toggleProbs(val) {
  showProbs = val;
  renderAll();
}

function renderGroupProbTable(groupName) {
  const standings = calculateStandings(groupName);
  const letter = getGroupLetter(groupName);
  const groupMatches = getGroupMatches(groupName);
  const played = groupMatches.filter(m => {
    const k = matchKey(m);
    return results[k] && results[k][0] !== null && results[k][1] !== null;
  }).length;

  const probs = simulateGroupPositions(groupName);

  const rows = standings.map((t, i) => {
    const p = probs[t.name] || [0, 0, 0, 0];
    const p1 = p[0], p2 = p[1];
    const barHtml = played < 3 ? `<div class="prob-bar-h"><div class="seg p1" style="width:${p[0]}%"></div><div class="seg p2" style="width:${p[1]}%"></div><div class="seg p3" style="width:${p[2]}%"></div><div class="seg p4" style="width:${p[3]}%"></div></div>` : '';
    return `<tr>
      <td class="pos">${i + 1}</td>
      <td class="team-col"><div class="team-cell"><span class="name">${t.name}</span><span class="code">${t.code}</span></div>${barHtml}</td>
      <td class="prob-col" style="color:var(--green)">${p1}%</td>
      <td class="prob-col" style="color:var(--accent)">${p2}%</td>
      <td class="prob-col" style="color:var(--amber)">${p[2]}%</td>
      <td class="prob-col" style="color:var(--red)">${p[3]}%</td>
    </tr>`;
  }).join('');

  return `
    <div class="group-section" data-group="${groupName}">
      <div class="group-title" onclick="toggleGroup(this)">
        <span>Grupo ${letter} <small style="color:var(--text3);font-weight:400">${played}/3</small></span>
        <span class="chevron">&#9662;</span>
      </div>
      <div class="group-table-wrap">
        <table class="prob-table">
          <thead>
            <tr>
              <th class="pos-col">#</th>
              <th class="team-col">Equipo</th>
              <th class="prob-col" style="color:var(--green)">1ro</th>
              <th class="prob-col" style="color:var(--accent)">2do</th>
              <th class="prob-col" style="color:var(--amber)">3ro</th>
              <th class="prob-col" style="color:var(--red)">4to</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function renderKOView(container) {
  const koMatches = getKOMatches();
  const rounds = {};
  koMatches.forEach(m => {
    const r = m.round;
    if (!rounds[r]) rounds[r] = [];
    rounds[r].push(m);
  });

  let html = '';
  const roundOrder = ['Round of 32','Round of 16','Quarter-final','Semi-final','Match for third place','Final'];

  roundOrder.forEach(r => {
    if (!rounds[r]) return;
    html += `<div class="round-label">${formatRound(r)}</div>`;
    rounds[r].forEach(m => {
      html += renderMatchCard(m, true);
    });
  });

  container.innerHTML = html;
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else document.querySelector(`.filter-btn[data-filter="${filter}"]`)?.classList.add('active');
  renderAll();
}

function renderAll() {
  const isDesktop = window.innerWidth >= 768;

  if (isDesktop) {
    document.getElementById('mobileContent').style.display = 'none';
    const layout = document.getElementById('desktopLayout');
    layout.style.display = 'grid';
    const matchesContainer = document.getElementById('desktopMatches');
    const groupsContainer = document.getElementById('desktopGroups');

    if (currentTab === 'ko') {
      renderKOView(matchesContainer);
    } else {
      renderMatchesView(matchesContainer, currentFilter);
    }
    renderGroupsView(groupsContainer, false);
  } else {
    document.getElementById('desktopLayout').style.display = 'none';
    const mobile = document.getElementById('mobileContent');
    mobile.classList.add('active');
    mobile.style.display = 'block';

    if (currentTab === 'matches') {
      renderMatchesView(mobile, currentFilter);
    } else if (currentTab === 'groups') {
      renderGroupsView(mobile);
    } else if (currentTab === 'ko') {
      renderKOView(mobile);
    }
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`)?.classList.add('active');
  renderAll();
}

function initTabs() {
  const tabsContainer = document.getElementById('tabs');
  const tabs = [
    { id: 'matches', label: 'Partidos', cls: '' },
    { id: 'groups', label: 'Grupos', cls: '' },
    { id: 'ko', label: 'Eliminaci\u00f3n', cls: 'gold' }
  ];
  tabsContainer.innerHTML = tabs.map(t =>
    `<button class="tab${t.cls}${t.id === currentTab ? ' active' : ''}" data-tab="${t.id}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');
}

function confirmReset() {
  document.getElementById('confirmOverlay').classList.add('show');
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('show');
}

function doReset() {
  results = {};
  saveResults();
  closeConfirm();
  renderAll();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function exportResults() {
  const keys = Object.keys(results);
  if (keys.length === 0) return '';
  const compact = {};
  keys.forEach(k => {
    if (results[k][0] !== null || results[k][1] !== null) {
      const v1 = results[k][0] !== null ? results[k][0] : '';
      const v2 = results[k][1] !== null ? results[k][1] : '';
      compact[k] = v1 + ',' + v2;
    }
  });
  const json = JSON.stringify(compact);
  try {
    return btoa(unescape(encodeURIComponent(json)));
  } catch(e) {
    return btoa(json);
  }
}

function importFromURL() {
  const params = new URLSearchParams(window.location.search);
  const data = params.get('r');
  if (!data) return;
  try {
    const json = decodeURIComponent(escape(atob(data)));
    const compact = JSON.parse(json);
    const imported = {};
    Object.keys(compact).forEach(k => {
      const parts = String(compact[k]).split(',');
      imported[k] = [parts[0] === '' ? null : parseInt(parts[0]), parts[1] === '' ? null : parseInt(parts[1])];
    });
    results = imported;
    saveResults();
    const url = new URL(window.location);
    url.searchParams.delete('r');
    window.history.replaceState({}, '', url);
    showToast('Resultados importados!');
  } catch(e) {
    console.warn('Error importing from URL', e);
  }
}

function openShare() {
  const data = exportResults();
  if (!data) {
    showToast('No hay resultados para compartir');
    return;
  }
  const url = new URL(window.location);
  url.searchParams.set('r', data);
  const shareUrl = url.toString();
  document.getElementById('shareLink').textContent = shareUrl;
  document.getElementById('shareOverlay').classList.add('show');
}

function closeShare() {
  document.getElementById('shareOverlay').classList.remove('show');
}

function copyLink() {
  const url = document.getElementById('shareLink').textContent;
  navigator.clipboard.writeText(url).then(() => {
    showToast('Link copiado!');
    closeShare();
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = url;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Link copiado!');
    closeShare();
  });
}

function waShare() {
  const url = document.getElementById('shareLink').textContent;
  window.open('https://wa.me/?text=' + encodeURIComponent('Mi Mundial 2026: ' + url));
  closeShare();
}

function tgShare() {
  const url = document.getElementById('shareLink').textContent;
  window.open('https://t.me/share/url?url=' + encodeURIComponent(url) + '&text=' + encodeURIComponent('Mi Mundial 2026'));
  closeShare();
}

function init() {
  loadResults();
  importFromURL();
  initTabs();
  renderAll();
}

init();
</script>
</body>
</html>
